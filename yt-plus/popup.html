<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>YT Folders</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; padding: 12px; width: 320px; }
      h1 { font-size: 14px; margin: 0 0 8px; }
      .sub { font-size: 12px; color: #555; margin-bottom: 12px; }
      .btn { display: block; width: 100%; text-align: left; padding: 10px; border-radius: 10px; border: 1px solid #ddd; background: #fff; cursor: pointer; margin-bottom: 8px; }
      .btn:hover { border-color: #111; }
      .tiny { font-size: 11px; color: #666; margin-top: 8px; }
      code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; }
    </style>
  </head>
  <body>
    <h1>YT Subscription Folders</h1>
    <div class="sub">
      Assign channels on <code>/feed/channels</code>, filter videos on <code>/feed/subscriptions</code>. Drag &amp; drop works onto the top folder bar and the left sidebar folders.
    </div>

    <button id="openManager" class="btn" type="button">Open Subscriptions Manager</button>
    <button id="openFeed" class="btn" type="button">Open Subscriptions Feed</button>
    <button id="openOptions" class="btn" type="button">Manage folders (Options)</button>

    <div class="tiny">Data is stored in Chrome storage (local to your browser profile).</div>

    <script src="popup.js"></script>
  </body>
</html>
